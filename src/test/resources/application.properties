# Default: MQTT disabled for tests that simulate messages; overridden by @DynamicPropertySource when using embedded broker
mqtt.enabled=false

# Required for OutboxService and Kafka publisher in integration tests
kafka.topic.device-state=device-state

# H2 in-memory for integration tests (Moquette excludes H2, so we need explicit config for JPA)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
