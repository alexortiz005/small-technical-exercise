spring.application.name=producer

# Default user for Spring Security (dev)
spring.security.user.name=admin
spring.security.user.password=admin

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:producerdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Expose health at /health (no /actuator prefix)
management.endpoints.web.base-path=/
management.endpoint.health.probes.enabled=true

# MQTT update mechanism
mqtt.enabled=true
mqtt.broker-url=tcp://localhost:1883
mqtt.topic-updates=devices/updates
mqtt.client-id=producer-${random.uuid}

# Kafka: default localhost:9094 (EXTERNAL listener) so host resolves; Docker sets SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
kafka.enabled=true
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
# device-state topic is created with log compaction (see KafkaTopicConfig)
kafka.topic.device-state=device-state
kafka.outbox.poll-interval-ms=1000
